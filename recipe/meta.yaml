{% set name = "skbase" %}
{% set version = "0.7.8" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://github.com/sktime/{{ name }}/archive/refs/tags/v{{ version }}.tar.gz
  sha256: d589bfdac279a31cfb2b01c4e637893152e434611dda0769eb796a79b60eb198

build:
  skip: True  # [py<38 or py>312]
  number: 0
  script: {{ PYTHON }} -m pip install . --no-deps --no-build-isolation -vv

requirements:
  host:
    - python
    - pip
    - setuptools >61
    - wheel
    - toml
    - python-build
  run:
    - python

test:
  source_files:
    - skbase/tests
  imports:
    - skbase
  commands:
    - pip check
    - pytest skbase/tests
  requires:
    - pip
    - pytest
    - numpy
    - scipy
    - pandas

about:
  home: https://github.com/sktime/skbase
  license: BSD-3-Clause
  license_file: LICENSE
  license_family: BSD
  summary: Base classes for sklearn-like parametric objects
  description: |
    skbase provides base classes for creating scikit-learn-like parametric objects, along with tools to make it easier
    to build your own packages that follow these design patterns.
  doc_url: https://github.com/sktime/skbase
  dev_url: https://github.com/sktime/skbase

extra:
  recipe-maintainers:
    - boldorider4
